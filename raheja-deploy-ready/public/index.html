<!DOCTYPE html>
<html>
<head>
  <title>Raheja Possession System</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f6fa; }
    .sidebar {
      width:220px; background:#0f3d3e; color:white;
      height:100vh; position:fixed; padding:20px;
    }
    .main { margin-left:240px; padding:20px; }
    .card {
      background:white; padding:15px; border-radius:10px;
      margin-bottom:15px;
    }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid #ddd; }
    .badge { padding:5px 10px; border-radius:20px; color:white; }
    .completed { background:green; }
    .pending { background:orange; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>RAHEJA</h2>
  <p>Possession System</p>
</div>

<div class="main">
  <h1>Dashboard</h1>

  <div class="card" id="stats"></div>

  <div class="card">
    <table id="table"></table>
  </div>
</div>

<script>
fetch("/api/customers")
.then(res => res.json())
.then(data => {
  let total = data.length;
  let completed = data.filter(d => d.stage === "Completed").length;

  document.getElementById("stats").innerHTML =
    "Total Units: " + total + " | Completed: " + completed;

  let html = "<tr><th>Flat</th><th>Name</th><th>Stage</th><th>Total</th></tr>";

  data.forEach(d => {
    html += `<tr>
      <td>${d.flat}</td>
      <td>${d.name}</td>
      <td><span class="badge ${d.stage === 'Completed' ? 'completed' : 'pending'}">${d.stage}</span></td>
      <td>${d.total}</td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
});
</script>

</body>
</html>
